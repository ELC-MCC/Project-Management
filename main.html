<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELC Project Management</title>
  <link rel="stylesheet" href="style.css">
  <script src="token.js"></script>
</head>
<body>

<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <h1>ELC Project Management</h1>
    <p>Select your role to continue</p>
    <select id="login-role">
      <option value="member">Member</option>
      <option value="officer">Officer</option>
    </select>
    <div id="login-pw-wrap">
      <input type="password" id="login-pw" placeholder="Officer password">
    </div>
    <div class="err" id="login-err"></div>
    <button id="login-btn">Enter</button>
  </div>
</div>

<header class="topbar">
  <div class="sync-group">
    <span class="sync-status-text" id="sync-status-text">Idle</span>
    <button id="sync-btn" class="sync-btn green">Sync</button>
    <button id="logout-btn" class="sync-btn" style="background:#333333;color:#CC9700;border-color:#555555">Logout</button>
  </div>
</header>

<div class="main">

  <!-- LEFT: Projects -->
  <div class="panel panel-left">
    <div class="panel-head">Projects</div>
    <div class="panel-body" id="proj-list"></div>
    <div class="panel-foot">
      <button class="btn btn-add" id="proj-add">+ Add</button>
      <button class="btn btn-del" id="proj-del">Delete</button>
    </div>
  </div>

  <!-- MIDDLE: Teams -->
  <div class="panel panel-mid">
    <div class="panel-head" id="team-head">Teams</div>
    <div class="panel-body" id="team-list"></div>
    <div class="panel-foot">
      <button class="btn btn-add" id="team-add">+ Add</button>
      <button class="btn btn-edit" id="team-edit">Edit</button>
      <button class="btn btn-del" id="team-del">Delete</button>
    </div>
  </div>

  <!-- RIGHT: Tasks -->
  <div class="panel panel-right">
    <div class="panel-head" id="task-head">Tasks</div>
    <div class="panel-body" id="task-list"></div>
    <div class="panel-foot">
      <button class="btn btn-add" id="task-add">+ Add</button>
      <button class="btn btn-del" id="task-del">Delete</button>
      <button class="btn btn-edit" id="task-toggle-archive" style="margin-left:auto;font-size:11px">Show Finished</button>
    </div>
  </div>

</div>

<!-- ================ TASK MODAL ================ -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2 id="modal-title">New Task</h2>
    <label for="modal-title-input">Title</label>
    <input id="modal-title-input" type="text">
    <label for="modal-desc-input">Description</label>
    <textarea id="modal-desc-input" rows="3"></textarea>
    <label for="modal-team-select">Assign Team</label>
    <select id="modal-team-select"><option value="0">-- None --</option></select>
    <label for="modal-persons-input">Assign People (comma separated)</label>
    <input id="modal-persons-input" type="text" placeholder="Alice, Bob, Charlie">
    <div class="modal-btns">
      <button id="modal-ok" class="mbtn-ok">OK</button>
      <button id="modal-cancel" class="mbtn-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ================ TEAM ADD MODAL ================ -->
<div id="team-modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2>New Team</h2>
    <label for="team-modal-name">Team Name</label>
    <input id="team-modal-name" type="text">
    <div class="member-area">
      <div class="member-area-label">Team Members:</div>
      <div id="team-modal-members-list"></div>
    </div>
    <div class="member-area">
      <div class="member-area-label">Add from project:</div>
      <div id="team-modal-avail" class="avail-grid"></div>
    </div>
    <div class="member-area">
      <div class="member-area-label">Add new:</div>
      <div class="add-row">
        <input id="team-modal-new-member" type="text" placeholder="Name">
        <button id="team-modal-add-member" class="mbtn-small">+ Add</button>
      </div>
    </div>
    <div class="modal-btns">
      <button id="team-modal-ok" class="mbtn-ok">OK</button>
      <button id="team-modal-cancel" class="mbtn-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ================ TEAM EDIT MODAL ================ -->
<div id="team-edit-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2>Edit Team</h2>
    <label for="team-edit-name">Team Name</label>
    <input id="team-edit-name" type="text">
    <div class="member-area">
      <div class="member-area-label">Team Members:</div>
      <div id="team-edit-members-list"></div>
    </div>
    <div class="member-area">
      <div class="member-area-label">Add from project:</div>
      <div id="team-edit-avail" class="avail-grid"></div>
    </div>
    <div class="member-area">
      <div class="member-area-label">Add new:</div>
      <div class="add-row">
        <input id="team-edit-new-member" type="text" placeholder="Name">
        <button id="team-edit-add-member" class="mbtn-small">+ Add</button>
      </div>
    </div>
    <div class="modal-btns">
      <button id="team-edit-ok" class="mbtn-ok">Save</button>
      <button id="team-edit-cancel" class="mbtn-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
// ===================================================================
var STATUSES = ['Pending', 'In Progress', 'In Review', 'Done', 'On Hold'];

var PASTELS = ['#FFB3BA','#BAFFC9','#BAE1FF','#FFFFBA','#E8BAFF','#FFD9BA','#BAFFF5','#FFC3E0','#C3FFC3','#C3D9FF'];

function pastelFor(name) {
  var hash = 0;
  for (var i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
  return PASTELS[Math.abs(hash) % PASTELS.length];
}

function statusClass(s) {
  if (s === 'Pending') return 'ps-pending';
  if (s === 'In Progress') return 'ps-progress';
  if (s === 'In Review') return 'ps-review';
  if (s === 'Done') return 'ps-done';
  if (s === 'On Hold') return 'ps-hold';
  return '';
}

// ===================================================================
var SEED_DATA = {
  teams: [
    { id: 1, name: 'Design Team', members: ['Alice', 'Bob'] },
    { id: 2, name: 'Dev Team', members: ['Charlie', 'Diana'] }
  ],
  projects: [
    { id: 1, name: 'Website Redesign', teams: [1], tasks: [
      { id: 1, title: 'Wireframe homepage', desc: '', status: 'Done', team: 1, persons: ['Alice'] },
      { id: 2, title: 'Design color palette', desc: 'Pick primary and accent colors', status: 'In Progress', team: 1, persons: ['Bob'] },
      { id: 3, title: 'Build components', desc: '', status: 'Pending', team: 0, persons: [] }
    ]},
    { id: 2, name: 'Mobile App v2', teams: [2], tasks: [
      { id: 1, title: 'Set up CI/CD', desc: '', status: 'Done', team: 2, persons: ['Charlie'] },
      { id: 2, title: 'Implement dark mode', desc: '', status: 'In Progress', team: 2, persons: ['Diana'] }
    ]}
  ]
};

// ===================================================================
var REPO_OWNER = 'ELC-MCC';
var REPO_NAME = 'Project-Management';
var DATA_PATH = 'data.json';
var BRANCH = 'main';

// ===================================================================
var syncBtn = document.getElementById('sync-btn');
var syncStatusEl = document.getElementById('sync-status-text');

function setSyncColor(state) { syncBtn.className = 'sync-btn ' + state; }
function setSyncText(text) { syncStatusEl.textContent = text; }

async function fetchFromRepo() {
  var url = 'https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME + '/' + BRANCH + '/' + DATA_PATH;
  var res = await fetch(url + '?t=' + Date.now());
  if (!res.ok) throw new Error('Fetch failed: ' + res.status);
  return await res.json();
}
async function pushToRepo(data) {
  var getUrl = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + DATA_PATH;
  var getRes = await fetch(getUrl, { headers: { 'Authorization': 'Bearer ' + API_TOKEN } });
  if (!getRes.ok) throw new Error('Failed to get file info: ' + getRes.status);
  var meta = await getRes.json();
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  var putRes = await fetch(getUrl, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + API_TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'sync data', content: content, sha: meta.sha })
  });
  if (!putRes.ok) throw new Error('Push failed: ' + putRes.status);
}

// ===================================================================
function loadLocal() {
  var raw = localStorage.getItem('elc_data');
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}
function saveLocal(data) { localStorage.setItem('elc_data', JSON.stringify(data)); }
function getData() {
  var d = loadLocal();
  if (!d) { saveLocal(SEED_DATA); return JSON.parse(JSON.stringify(SEED_DATA)); }
  return d;
}

var data = getData();
var selProj = null;
var selTeam = null;
var selTask = null;
var showArchived = false;
var userRole = null;

// ===================================================================
//  Role login
// ===================================================================
var loginRole = document.getElementById('login-role');
var loginPw = document.getElementById('login-pw');
var loginPwWrap = document.getElementById('login-pw-wrap');
var loginErr = document.getElementById('login-err');

// Show/hide password field based on role
loginRole.addEventListener('change', function() {
  loginPwWrap.style.display = (this.value === 'officer') ? 'block' : 'none';
  loginErr.textContent = '';
});
loginPwWrap.style.display = 'none'; // Member selected by default

document.getElementById('login-btn').addEventListener('click', function() {
  var role = loginRole.value;

  if (role === 'member') {
    userRole = 'member';
    document.getElementById('login-overlay').classList.add('hidden');
    document.body.classList.add('member-mode');
    document.getElementById('login-pw').value = '';
    renderAll();
    return;
  }

  if (role === 'officer') {
    var pw = loginPw.value;
    if (typeof OFFICER_PASSWORD !== 'undefined' && pw === OFFICER_PASSWORD) {
      userRole = 'officer';
      document.getElementById('login-overlay').classList.add('hidden');
      document.body.classList.remove('member-mode');
      document.getElementById('login-pw').value = '';
      renderAll();
    } else {
      loginErr.textContent = 'Incorrect password';
      loginPw.value = '';
    }
  }
});

loginPw.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// ===================================================================
function initData() {
  if (typeof API_TOKEN !== 'undefined' && API_TOKEN !== '') {
    setSyncText('Loading...');
    setSyncColor('yellow');
    fetchFromRepo().then(function(remote) {
      data = remote;
      saveLocal(data);
      setSyncText('Synced');
      setSyncColor('green');
      renderAll();
    }).catch(function() {
      setSyncText('Offline');
      setSyncColor('red');
      renderAll();
    });
  } else {
    renderAll();
  }
}

// ===================================================================
var projListEl = document.getElementById('proj-list');
var teamListEl = document.getElementById('team-list');
var teamHeadEl = document.getElementById('team-head');
var taskListEl = document.getElementById('task-list');
var taskHeadEl = document.getElementById('task-head');

function renderAll() { renderProjects(); renderTeams(); renderTasks(); }

function getProjectTeams(proj) {
  if (!proj || !proj.teams) return [];
  return data.teams.filter(function(t) { return proj.teams.indexOf(t.id) >= 0; });
}

// ===================================================================
function renderProjects() {
  projListEl.innerHTML = '';
  data.projects.forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'proj-item' + (p.id === selProj ? ' active' : '');
    div.textContent = p.name;
    div.addEventListener('click', function() { selectProject(p.id); });
    projListEl.appendChild(div);
  });
  if (data.projects.length === 0) projListEl.innerHTML = '<div class="empty">No projects</div>';
}

function selectProject(id) {
  selProj = id; selTeam = null; selTask = null;
  renderAll();
}

// ===================================================================
function renderTeams() {
  var proj = null;
  for (var i = 0; i < data.projects.length; i++) {
    if (data.projects[i].id === selProj) { proj = data.projects[i]; break; }
  }
  if (!proj) {
    teamHeadEl.textContent = 'Teams';
    teamListEl.innerHTML = '<div class="empty">Select a project</div>';
    return;
  }
  teamHeadEl.textContent = 'Teams';
  teamListEl.innerHTML = '';

  var pTeams = getProjectTeams(proj);
  pTeams.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'team-item' + (t.id === selTeam ? ' active' : '');
    div.innerHTML = '<div style="font-weight:bold;margin-bottom:2px">' + esc(t.name) + '</div>';
    t.members.forEach(function(m) {
      div.innerHTML += '<span class="pastel-tag" style="background:' + pastelFor(m) + ';color:#000000">' + esc(m) + '</span> ';
    });
    div.addEventListener('click', function() { selTeam = t.id; renderTeams(); renderTasks(); });
    teamListEl.appendChild(div);
  });
  if (pTeams.length === 0) teamListEl.innerHTML = '<div class="empty">No teams</div>';
}

// ===================================================================
function renderTasks() {
  var proj = null;
  for (var i = 0; i < data.projects.length; i++) {
    if (data.projects[i].id === selProj) { proj = data.projects[i]; break; }
  }
  if (!proj) {
    taskHeadEl.textContent = 'Tasks';
    taskListEl.innerHTML = '<div class="empty">Select a project</div>';
    return;
  }
  taskHeadEl.textContent = 'Tasks -- ' + proj.name;
  taskListEl.innerHTML = '';

  var tasksToShow = proj.tasks.filter(function(t) {
    return showArchived ? (t.archived === true) : (t.archived !== true);
  });

  tasksToShow.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'task-item' + (t.id === selTask ? ' active' : '');
    div.dataset.id = t.id;

    // Build tags HTML (team + persons)
    var tagsHtml = '';
    if (t.team) {
      for (var k = 0; k < data.teams.length; k++) {
        if (data.teams[k].id === t.team) {
          tagsHtml += '<span class="pastel-tag" style="background:' + pastelFor(data.teams[k].name) + ';color:#000000">' + esc(data.teams[k].name) + '</span>';
          break;
        }
      }
    }
    if (t.persons) {
      t.persons.forEach(function(p) {
        tagsHtml += '<span class="pastel-tag" style="background:' + pastelFor(p) + ';color:#000000">' + esc(p) + '</span>';
      });
    }

    var isOpen = (t.id === selTask && t.desc) ? ' open' : '';

    div.innerHTML =
      '<div class="task-top">' +
        '<span class="task-title">' + esc(t.title) + '</span>' +
        '<span class="task-tags">' + tagsHtml + '</span>' +
        '<select class="task-status-select ' + statusClass(t.status) + '" data-tid="' + t.id + '">' +
          statusOptions(t.status) +
        '</select>' +
      '</div>' +
      '<div class="task-desc-wrap' + isOpen + '" data-tid="' + t.id + '">' +
        '<textarea class="task-desc-text" data-tid="' + t.id + '" placeholder="Description...">' + esc(t.desc || '') + '</textarea>' +
      '</div>';

    div.addEventListener('click', function(e) {
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
      selTask = (selTask === t.id) ? null : t.id;
      renderTasks();
    });

    taskListEl.appendChild(div);
  });

  // Bind status dropdowns
  document.querySelectorAll('.task-status-select').forEach(function(el) {
    el.addEventListener('change', function(e) {
      e.stopPropagation();
      var tid = parseInt(this.dataset.tid);
      for (var i = 0; i < data.projects.length; i++) {
        if (data.projects[i].id === selProj) {
          for (var j = 0; j < data.projects[i].tasks.length; j++) {
            if (data.projects[i].tasks[j].id === tid) {
              data.projects[i].tasks[j].status = this.value;
              this.className = 'task-status-select ' + statusClass(this.value);
              persist();

              // If set to Done, prompt to archive after 1 second
              if (this.value === 'Done') {
                var task = data.projects[i].tasks[j];
                setTimeout(function() {
                  if (confirm('Archive "' + task.title + '"?')) {
                    task.archived = true;
                    persist();
                    renderTasks();
                  }
                }, 1000);
              }
              return;
            }
          }
        }
      }
    });
  });

  // Bind description textareas
  document.querySelectorAll('.task-desc-text').forEach(function(el) {
    el.addEventListener('change', function(e) {
      e.stopPropagation();
      var tid = parseInt(this.dataset.tid);
      for (var i = 0; i < data.projects.length; i++) {
        if (data.projects[i].id === selProj) {
          for (var j = 0; j < data.projects[i].tasks.length; j++) {
            if (data.projects[i].tasks[j].id === tid) {
              data.projects[i].tasks[j].desc = this.value;
              persist();
              return;
            }
          }
        }
      }
    });
  });

  if (tasksToShow.length === 0) {
    taskListEl.innerHTML = '<div class="empty">' + (showArchived ? 'No finished tasks' : 'No tasks') + '</div>';
  }
}

function statusOptions(current) {
  var opts = '';
  STATUSES.forEach(function(s) { opts += '<option value="' + s + '"' + (s === current ? ' selected' : '') + '>' + s + '</option>'; });
  return opts;
}

function esc(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function nextId(items) { var max = 0; for (var i = 0; i < items.length; i++) { if (items[i].id > max) max = items[i].id; } return max + 1; }
function persist() { saveLocal(data); setSyncText('Unsaved'); setSyncColor('red'); }

// Get all unique person names from a project's teams and tasks
function getProjectPeople(projId) {
  var names = {};
  // Get names from tasks
  for (var i = 0; i < data.projects.length; i++) {
    if (data.projects[i].id === projId) {
      data.projects[i].tasks.forEach(function(t) {
        if (t.persons) t.persons.forEach(function(p) { names[p] = true; });
      });
      // Get names from teams assigned to this project
      if (data.projects[i].teams) {
        data.projects[i].teams.forEach(function(tid) {
          for (var j = 0; j < data.teams.length; j++) {
            if (data.teams[j].id === tid) {
              data.teams[j].members.forEach(function(m) { names[m] = true; });
            }
          }
        });
      }
      break;
    }
  }
  return Object.keys(names).sort();
}

// Render a member picker inside a modal
// containerId: element id to render into
// members: current array of member names
// availPeople: array of available names to suggest
// onChange: called when members change
var _memberPickers = {};
function renderMemberPicker(modalKey, containerId, availInputId, addBtnId, members, availPeople, onChange) {
  _memberPickers[modalKey] = { members: members, onChange: onChange };
  renderMembersList(modalKey, containerId, availInputId, addBtnId, availPeople);
}
function renderMembersList(modalKey, containerId, availInputId, addBtnId, availPeople) {
  var state = _memberPickers[modalKey];
  if (!state) return;
  var members = state.members;

  // Render current members
  var listEl = document.getElementById(containerId);
  listEl.innerHTML = '';
  members.forEach(function(m, idx) {
    var tag = document.createElement('span');
    tag.className = 'pastel-tag member-tag';
    tag.style.background = pastelFor(m);
    tag.style.color = '#000000';
    tag.innerHTML = esc(m) + ' <span class="remove" data-idx="' + idx + '">X</span>';
    tag.querySelector('.remove').addEventListener('click', function(e) {
      e.stopPropagation();
      members.splice(parseInt(this.dataset.idx), 1);
      renderMembersList(modalKey, containerId, availInputId, addBtnId, availPeople);
      if (state.onChange) state.onChange(members);
    });
    listEl.appendChild(tag);
  });

  // Render available people (not already in members)
  var availEl = document.getElementById(availInputId.replace('-new-member', '-avail'));
  if (!availEl) availEl = document.getElementById(availInputId);
  // Find the avail grid
  var gridId = containerId.replace('-members-list', '-avail');
  var grid = document.getElementById(gridId);
  if (grid) {
    grid.innerHTML = '';
    availPeople.forEach(function(name) {
      if (members.indexOf(name) >= 0) return;
      var btn = document.createElement('button');
      btn.textContent = name;
      btn.addEventListener('click', function() {
        members.push(name);
        renderMembersList(modalKey, containerId, availInputId, addBtnId, availPeople);
        if (state.onChange) state.onChange(members);
      });
      grid.appendChild(btn);
    });
  }
}

// ===================================================================
syncBtn.addEventListener('click', function() {
  if (typeof API_TOKEN=== 'undefined' || !API_TOKEN) { setSyncText('No token'); return; }
  setSyncText('Syncing...');
  setSyncColor('yellow');
  pushToRepo(data).then(function() { setSyncText('Synced'); setSyncColor('green'); })
    .catch(function(e) { setSyncText('Error'); setSyncColor('red'); });
});

// ===================================================================
document.getElementById('proj-add').addEventListener('click', function() {
  var name = prompt('Project name:');
  if (name && name.trim()) {
    data.projects.push({ id: nextId(data.projects), name: name.trim(), teams: [], tasks: [] });
    persist();
    selProj = data.projects[data.projects.length - 1].id;
    renderAll();
  }
});

document.getElementById('proj-del').addEventListener('click', function() {
  if (selProj === null) return;
  var found = null;
  for (var i = 0; i < data.projects.length; i++) { if (data.projects[i].id === selProj) { found = data.projects[i]; break; } }
  if (!found) return;
  if (!confirm('Delete "' + found.name + '" and all its teams and tasks?')) return;
  data.projects = data.projects.filter(function(p) { return p.id !== selProj; });
  persist();
  selProj = data.projects.length > 0 ? data.projects[0].id : null;
  renderAll();
});

// ===================================================================
// Team modals
// ===================================================================
document.getElementById('team-add').addEventListener('click', function() {
  if (selProj === null) { alert('Select a project first.'); return; }
  document.getElementById('team-modal-name').value = '';
  var members = [];
  var availPeople = getProjectPeople(selProj);
  renderMemberPicker('add', 'team-modal-members-list', 'team-modal-new-member', 'team-modal-add-member', members, availPeople, function(m) { members = m; });
  document.getElementById('team-modal-overlay').style.display = 'flex';
  document.getElementById('team-modal-name').focus();
});

document.getElementById('team-modal-add-member').addEventListener('click', function() {
  var input = document.getElementById('team-modal-new-member');
  var name = input.value.trim();
  if (!name) return;
  var state = _memberPickers['add'];
  if (state && state.members.indexOf(name) < 0) {
    state.members.push(name);
    var availPeople = getProjectPeople(selProj);
    renderMembersList('add', 'team-modal-members-list', 'team-modal-new-member', 'team-modal-add-member', availPeople);
  }
  input.value = '';
  input.focus();
});

document.getElementById('team-modal-new-member').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('team-modal-add-member').click();
});

document.getElementById('team-modal-ok').addEventListener('click', function() {
  var name = document.getElementById('team-modal-name').value.trim();
  if (!name) { alert('Team name required.'); return; }
  var state = _memberPickers['add'];
  var members = state ? state.members : [];
  if (members.length === 0) { alert('At least one member required.'); return; }
  var newTeam = { id: nextId(data.teams), name: name, members: members.slice() };
  data.teams.push(newTeam);
  for (var i = 0; i < data.projects.length; i++) {
    if (data.projects[i].id === selProj) {
      if (!data.projects[i].teams) data.projects[i].teams = [];
      if (data.projects[i].teams.indexOf(newTeam.id) < 0) data.projects[i].teams.push(newTeam.id);
      break;
    }
  }
  persist();
  document.getElementById('team-modal-overlay').style.display = 'none';
  renderAll();
});

document.getElementById('team-modal-cancel').addEventListener('click', function() {
  document.getElementById('team-modal-overlay').style.display = 'none';
});

document.getElementById('team-edit').addEventListener('click', function() {
  if (selTeam === null) { alert('Select a team first.'); return; }
  var team = null;
  for (var i = 0; i < data.teams.length; i++) { if (data.teams[i].id === selTeam) { team = data.teams[i]; break; } }
  if (!team) return;
  document.getElementById('team-edit-name').value = team.name;
  var members = team.members.slice();
  var availPeople = getProjectPeople(selProj);
  renderMemberPicker('edit', 'team-edit-members-list', 'team-edit-new-member', 'team-edit-add-member', members, availPeople, function(m) { members = m; });
  document.getElementById('team-edit-overlay').style.display = 'flex';
});

document.getElementById('team-edit-add-member').addEventListener('click', function() {
  var input = document.getElementById('team-edit-new-member');
  var name = input.value.trim();
  if (!name) return;
  var state = _memberPickers['edit'];
  if (state && state.members.indexOf(name) < 0) {
    state.members.push(name);
    var availPeople = getProjectPeople(selProj);
    renderMembersList('edit', 'team-edit-members-list', 'team-edit-new-member', 'team-edit-add-member', availPeople);
  }
  input.value = '';
  input.focus();
});

document.getElementById('team-edit-new-member').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('team-edit-add-member').click();
});

document.getElementById('team-edit-ok').addEventListener('click', function() {
  var name = document.getElementById('team-edit-name').value.trim();
  if (!name) { alert('Team name required.'); return; }
  var state = _memberPickers['edit'];
  if (!state || state.members.length === 0) { alert('At least one member required.'); return; }
  for (var i = 0; i < data.teams.length; i++) {
    if (data.teams[i].id === selTeam) { data.teams[i].name = name; data.teams[i].members = state.members.slice(); break; }
  }
  persist();
  document.getElementById('team-edit-overlay').style.display = 'none';
  renderAll();
});

document.getElementById('team-edit-cancel').addEventListener('click', function() {
  document.getElementById('team-edit-overlay').style.display = 'none';
});

document.getElementById('team-del').addEventListener('click', function() {
  if (selTeam === null) { alert('Select a team first.'); return; }
  if (!confirm('Delete this team?')) return;
  data.teams = data.teams.filter(function(t) { return t.id !== selTeam; });
  for (var i = 0; i < data.projects.length; i++) {
    if (data.projects[i].teams) data.projects[i].teams = data.projects[i].teams.filter(function(tid) { return tid !== selTeam; });
  }
  persist();
  selTeam = null;
  renderAll();
});

// ===================================================================
// Task modal
// ===================================================================
var modalOverlay = document.getElementById('modal-overlay');
var modalTitleInput = document.getElementById('modal-title-input');
var modalDescInput = document.getElementById('modal-desc-input');
var modalTeamSelect = document.getElementById('modal-team-select');
var modalPersonsInput = document.getElementById('modal-persons-input');

document.getElementById('task-add').addEventListener('click', function() {
  if (selProj === null) { alert('Select a project first.'); return; }
  modalTitleInput.value = '';
  modalDescInput.value = '';
  modalPersonsInput.value = '';

  // Populate team dropdown
  modalTeamSelect.innerHTML = '<option value="0">-- None --</option>';
  var proj = null;
  for (var i = 0; i < data.projects.length; i++) { if (data.projects[i].id === selProj) { proj = data.projects[i]; break; } }
  if (proj && proj.teams) {
    for (var i = 0; i < proj.teams.length; i++) {
      for (var j = 0; j < data.teams.length; j++) {
        if (data.teams[j].id === proj.teams[i]) {
          var opt = document.createElement('option');
          opt.value = data.teams[j].id;
          opt.textContent = data.teams[j].name + ' (' + data.teams[j].members.join(', ') + ')';
          modalTeamSelect.appendChild(opt);
        }
      }
    }
  }
  modalOverlay.style.display = 'flex';
  modalTitleInput.focus();
});

document.getElementById('modal-ok').addEventListener('click', function() {
  var title = modalTitleInput.value.trim();
  if (!title) { alert('Task title required.'); return; }
  var proj = null;
  for (var i = 0; i < data.projects.length; i++) { if (data.projects[i].id === selProj) { proj = data.projects[i]; break; } }
  if (!proj) return;

  var teamId = parseInt(modalTeamSelect.value) || 0;
  var persons = modalPersonsInput.value.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });

  proj.tasks.push({
    id: nextId(proj.tasks),
    title: title,
    desc: modalDescInput.value,
    status: 'Pending',
    team: teamId,
    persons: persons
  });
  persist();
  modalOverlay.style.display = 'none';
  renderTasks();
});

document.getElementById('modal-cancel').addEventListener('click', function() {
  modalOverlay.style.display = 'none';
});

document.getElementById('task-del').addEventListener('click', function() {
  if (selProj === null || selTask === null) { alert('Select a task first.'); return; }
  if (!confirm('Delete this task?')) return;
  for (var i = 0; i < data.projects.length; i++) {
    if (data.projects[i].id === selProj) {
      data.projects[i].tasks = data.projects[i].tasks.filter(function(t) { return t.id !== selTask; });
      break;
    }
  }
  persist();
  selTask = null;
  renderTasks();
});

document.getElementById('task-toggle-archive').addEventListener('click', function() {
  showArchived = !showArchived;
  this.textContent = showArchived ? 'Show Current' : 'Show Finished';
  selTask = null;
  renderTasks();
});

document.getElementById('logout-btn').addEventListener('click', function() {
  userRole = null;
  document.getElementById('login-overlay').classList.remove('hidden');
  document.body.classList.remove('member-mode');
  document.getElementById('login-pw').value = '';
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-pw-wrap').style.display = 'none';
  document.getElementById('login-role').value = 'member';
});

// ===================================================================
initData();
</script>
</body>
</html>
