<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
  <meta http-equiv="pragma" content="no-cache" />
  <title>ELC Project Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000000;
      color: #CC9700;
      font-family: "Courier New", Courier, monospace;
    }
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .login-box {
      border: 2px solid #CC9700;
      padding: 24px 32px;
      text-align: center;
      width: 300px;
    }
    .login-box h1 {
      font-size: 18px;
      font-weight: normal;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-box p {
      font-size: 12px;
      margin-bottom: 20px;
    }
    .login-box input {
      width: 100%;
      margin-bottom: 8px;
      text-align: center;
      font-family: inherit;
      font-size: inherit;
      background: #000000;
      color: #CC9700;
      border: 2px solid #CC9700;
      padding: 6px 10px;
    }
    .login-box input:focus { outline: none; }
    .login-box button {
      width: 100%;
      font-family: inherit;
      font-size: inherit;
      background: #000000;
      color: #CC9700;
      border: 2px solid #CC9700;
      padding: 6px 10px;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #CC9700;
      color: #000000;
    }
    .remember-wrap {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .remember-wrap.visible { display: flex; }
    .remember-wrap input { width: auto; margin: 0; }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid #CC9700;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

    <div class="login-box">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

    <div class="login-box">
      <h1>ELC Project Management</h1>
      <p>Enter team password to continue</p>

        <input
          type="password"
          id="staticrypt-password"
          placeholder="Password"

        <div id="staticrypt-remember-wrap" class="remember-wrap">
          <input type="checkbox" id="staticrypt-remember" />
          <label for="staticrypt-remember">Remember me</label>
